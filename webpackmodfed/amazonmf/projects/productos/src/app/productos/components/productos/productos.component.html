<!-- pintamos el producto en un card -->
 <div class="prodcutos-container" *ngIf="productos.length>0; else sinProductos">
     <app-producto-card
     *ngFor="let p of productos"
     [producto]="p"
     (agregar)="agregarAlCarrito($event)"
     >

</app-producto-card>
</div>

<ng-template #sinProductos>
    <p>No hay productos disponible</p>
</ng-template>
