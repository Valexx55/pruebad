<div class="carrito-container">

    <h2>Carrito de la compra</h2>

    <table class="table">
        <thead>
            <tr>
                <th>
                    Productos
                </th>
                <th>
                    Cantidad
                </th>
                <th>
                    Precio
                </th>
            </tr>
        </thead>
        <!-- <tbody *ngIf="carrito && carrito.length >0; else carritoVacio">
            <tr *ngFor="let item of carrito; trackBy: trackById">
                <td>{{item.nombre}}</td>
                <td>{{item.cantidad}}</td>
                <td>{{item.precio| currency:'EUR'}}</td>

            </tr>

        </tbody> -->


       <tbody>
            <!-- con la pipe async, consumo directamente los datos que proporciona el observable
             me ahorro la suscripción -->
            <tr *ngIf="(productos$ | async)?.length === 0">
                <td colspan="3">Carrito vacío</td>
            </tr>

            <tr *ngFor="let p of (productos$ | async); trackBy: trackById">
                <td>{{p.nombre}}</td>
                <td>{{p.cantidad}}</td>
                <td>{{p.precio| currency:'EUR'}}</td>

            </tr>

        </tbody>


        <ng-template #carritoVacio>
            <tbody>
                <tr>
                    <td colspan="3" class="text-center" >Tu carrito está vacío</td>
                </tr>
            </tbody>
        </ng-template>

    </table>
    <!-- TODO: Consumir un total de forma reactiva con un Observable Number-->
    <div class = "carrito-total">
        <!-- <strong>TOTAL:</strong> {{total | currency:'EUR'}} -->
        <strong>TOTAL:</strong> {{total$ | async | currency:'EUR'}}
    </div>

    <button (click)="vaciarCarrito()">Vaciar carrito</button>
</div>
