<single-spa-router>
  <!--

    This is the single-spa Layout Definition for your microfrontends.
    See https://single-spa.js.org/docs/layout-definition/ for more information.

  -->

  <!-- Example layouts you might find helpful:

  <nav>
    <application name="@org/navbar"></application>
  </nav>
  <route path="settings">
    <application name="@org/settings"></application>
  </route>

  -->

  <nav style="display:flex; gap:12px; padding:12px; border-bottom:1px solid #ddd;">
    <a href="/news">News</a>
    <a href="/favorites">Favorites</a>
  </nav>

  <main>
    <route default>
      <application name="@single-spa/welcome"></application>
    </route>
    <route path="news">
      <application name="@vm/news-app"></application>
    </route>

    <route path="favorites">
      <application name="@vm/favorites-app"></application>
    </route>
  </main>
</single-spa-router>
