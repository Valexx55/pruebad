<h2>Favoritos</h2>

<p *ngIf="favorites.length === 0" class="empty">
  No hay favoritos todavía.
</p>

<div *ngIf="favorites.length > 0" class="favorites-list">
  <div class="favorite-card" *ngFor="let item of favorites">
    <img
      class="favorite-image"
      [src]="item.image_url"
      [alt]="item.title"
    />

    <div class="favorite-content">
      <h3 class="favorite-title">{{ item.title }}</h3>

      <p class="favorite-description">
        {{ item.summary }}
      </p>

      <div class="favorite-actions">
        <a
          class="favorite-link"
          [href]="item.url"
          target="_blank"
          rel="noopener noreferrer"
        >
          Leer más
        </a>

        <button class="remove-btn" (click)="removeFavorite(item.id)">
          Quitar de favoritos
        </button>
      </div>
    </div>
  </div>
</div>
